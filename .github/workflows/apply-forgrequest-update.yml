name: Apply ForgRequest release

on:
  push:
    branches:
      - main
    paths:
      - .forgrequest-update/archive.tar.gz.b64

permissions:
  contents: write

jobs:
  apply-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract release source
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/forgrequest-release
          base64 --decode .forgrequest-update/archive.tar.gz.b64 > /tmp/forgrequest-release.tar.gz
          tar -xzf /tmp/forgrequest-release.tar.gz -C /tmp/forgrequest-release
          source_dir="$(find /tmp/forgrequest-release -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$source_dir"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.forgrequest-update/' \
            "$source_dir/" ./
          rm -rf .forgrequest-update
          rm -f .github/workflows/apply-forgrequest-update.yml

      - name: Validate release
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q forgrequest.py src
          python forgrequest.py --version
          python forgrequest.py --help >/dev/null
          python forgrequest.py web --help >/dev/null
          python forgrequest.py diff --help >/dev/null
          python forgrequest.py update --help >/dev/null
          python forgrequest.py browser-install --help >/dev/null
          python forgrequest.py -u https://example.com --dry-run --no-logo --no-color >/dev/null

      - name: Commit release
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Release ForgRequest v1.8.0 with streamlined documentation"
          git push
