name: Apply ForgRequest release

on:
  push:
    branches:
      - main
    paths:
      - .forgrequest-update/ready

permissions:
  contents: write

jobs:
  apply-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Assemble release source
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          if [[ -d .forgrequest-update/parts ]]; then
            while IFS= read -r -d '' part_dir; do
              rel="${part_dir#.forgrequest-update/parts/}"
              target=".forgrequest-update/project/$rel"
              mkdir -p "$(dirname "$target")"
              cat "$part_dir"/* > "$target"
            done < <(find .forgrequest-update/parts -type d -links 2 -print0)
          fi
          test -d .forgrequest-update/project
          rsync -a .forgrequest-update/project/ ./
          mkdir -p docs
          cp README.md docs/README.md
          chmod +x forgrequest.py install/linux/install_linux.sh
          rm -rf .forgrequest-update
          rm -f .github/workflows/apply-forgrequest-update.yml

      - name: Validate release
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m compileall -q forgrequest.py src
          python forgrequest.py --version
          python forgrequest.py --help >/dev/null
          python forgrequest.py web --help >/dev/null
          python forgrequest.py diff --help >/dev/null
          python forgrequest.py update --help >/dev/null
          python forgrequest.py browser-install --help >/dev/null
          python forgrequest.py -u https://example.com --dry-run --no-logo --no-color >/dev/null
          ! grep -Eiq '^## (What changed|Previous v[0-9])' README.md
          cmp -s README.md docs/README.md
          test "$(grep -c 'data-run-request' src/forgrequest/webui.py)" -ge 1
          bash -n install/linux/install_linux.sh

      - name: Commit release
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Release ForgRequest v1.8.0 with streamlined documentation"
          git push
